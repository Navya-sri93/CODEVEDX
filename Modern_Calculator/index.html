<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="calculator-container">
        <div class="calculator">
            <div class="calc-header">
                <button id="history-toggle" title="View History">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </button>
            </div>

            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>

            <div class="buttons-grid">
                <button class="btn action" data-clear>AC</button>
                <button class="btn action" data-delete>DEL</button>
                <button class="btn action" data-operator="%">%</button>
                <button class="btn operator" data-operator="/">÷</button>

                <button class="btn" data-number>7</button>
                <button class="btn" data-number>8</button>
                <button class="btn" data-number>9</button>
                <button class="btn operator" data-operator="*">×</button>

                <button class="btn" data-number>4</button>
                <button class="btn" data-number>5</button>
                <button class="btn" data-number>6</button>
                <button class="btn operator" data-operator="-">−</button>

                <button class="btn" data-number>1</button>
                <button class="btn" data-number>2</button>
                <button class="btn" data-number>3</button>
                <button class="btn operator" data-operator="+">+</button>

                <button class="btn" data-number>0</button>
                <button class="btn" data-number>.</button>
                <button class="btn equals span-two" data-equals>=</button>
            </div>
        </div>

        <div class="history-panel" id="history-panel">
            <div class="history-header">
                <h3>History</h3>
                <button id="clear-history" title="Clear All">Clear</button>
            </div>
            <div class="history-list" id="history-list">
                <div class="empty-history-msg">No history yet</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
